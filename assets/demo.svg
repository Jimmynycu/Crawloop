<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 540" width="1200" height="540" role="img" aria-labelledby="demo-title demo-desc" preserveAspectRatio="xMidYMid meet" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
  <title id="demo-title">crawloop self-heal cycle</title>
  <desc id="demo-desc">Three beats from the offline demo. BEFORE: a site redesign breaks the v1 crawler, which now matches zero nodes. DURING: drift is detected, the LLM serves the request immediately and a fresh crawler v2 is written and promoted, costing six model calls this once. AFTER: v2 serves the new layout straight from the registry with zero model calls. The numbers match the real output of selfheal_demo.py.</desc>

  <!-- self-contained background panel: deliberate on both #0d1117 and #ffffff -->
  <rect x="0" y="0" width="1200" height="540" rx="20" fill="#0A0C14"/>
  <rect x="0.75" y="0.75" width="1198.5" height="538.5" rx="19.25" fill="none" stroke="#222A35" stroke-width="1.5"/>

  <!-- ============ HEADER ============ -->
  <text x="48" y="58" font-size="22" font-weight="700" letter-spacing="-0.4" fill="#C9D1D9">The self-heal cycle</text>
  <text x="48" y="84" font-size="14.5" font-weight="400" fill="#8B949E">A site redesign, served without an outage <tspan fill="#30363D">&#8212;</tspan> the real output of <tspan font-family="ui-monospace, SFMono-Regular, 'SF Mono', Menlo, Consolas, 'Liberation Mono', monospace" fill="#C9D1D9">python examples/selfheal_demo.py</tspan></text>
  <!-- evidence-column header, right-aligned over the number rail -->
  <text x="1152" y="58" text-anchor="end" font-size="12" font-weight="400" fill="#8B949E" font-family="ui-monospace, SFMono-Regular, 'SF Mono', Menlo, Consolas, 'Liberation Mono', monospace">MODEL CALLS</text>
  <text x="1152" y="84" text-anchor="end" font-size="12" font-weight="400" fill="#30363D" font-family="ui-monospace, SFMono-Regular, 'SF Mono', Menlo, Consolas, 'Liberation Mono', monospace">to serve this page</text>

  <line x1="48" y1="104" x2="1152" y2="104" stroke="#222A35" stroke-width="1"/>

  <!-- the vertical spine the three beats hang from -->
  <line x1="74" y1="150" x2="74" y2="470" stroke="#222A35" stroke-width="1.5"/>

  <!-- =================================================================== -->
  <!-- BEAT 1 : BEFORE - redesign breaks v1 (tiny red footprint)            -->
  <!-- =================================================================== -->
  <g>
    <circle cx="74" cy="170" r="6" fill="#0A0C14" stroke="#F85149" stroke-width="2.5"/>
    <text x="108" y="160" font-size="12.5" font-weight="700" letter-spacing="1.5" fill="#F85149">BEFORE</text>
    <text x="108" y="186" font-size="18" font-weight="600" fill="#C9D1D9">A redesign renames every CSS hook. The old crawler breaks.</text>

    <!-- selector diff: factual, taken from the demo narration -->
    <g font-size="13.5" font-family="ui-monospace, SFMono-Regular, 'SF Mono', Menlo, Consolas, 'Liberation Mono', monospace">
      <text x="108" y="214" fill="#8B949E">article.product_pod <tspan fill="#30363D">&#8594;</tspan> <tspan fill="#C9D1D9">div.card</tspan>     .price_color <tspan fill="#30363D">&#8594;</tspan> <tspan fill="#C9D1D9">span.price-box</tspan></text>
    </g>
    <text x="108" y="238" font-size="14" font-weight="400" fill="#8B949E">v1 still runs, but now matches <tspan fill="#F85149" font-weight="600">0 nodes</tspan>. In a plain pipeline this is a silent outage.</text>

    <!-- evidence: not served, broken -->
    <text x="1152" y="182" text-anchor="end" font-size="40" font-weight="700" fill="#F85149" font-family="ui-monospace, SFMono-Regular, 'SF Mono', Menlo, Consolas, 'Liberation Mono', monospace">0</text>
    <text x="1152" y="206" text-anchor="end" font-size="12" font-weight="400" fill="#8B949E" font-family="ui-monospace, SFMono-Regular, 'SF Mono', Menlo, Consolas, 'Liberation Mono', monospace">records: 0 (broken)</text>
  </g>

  <line x1="108" y1="266" x2="1152" y2="266" stroke="#222A35" stroke-width="1" stroke-dasharray="2 4"/>

  <!-- =================================================================== -->
  <!-- BEAT 2 : DURING - serve now + heal (the one amber spotlight)         -->
  <!-- =================================================================== -->
  <g>
    <circle cx="74" cy="300" r="6" fill="#0A0C14" stroke="#D29922" stroke-width="2.5"/>
    <text x="108" y="298" font-size="12.5" font-weight="700" letter-spacing="1.5" fill="#D29922">DURING</text>
    <text x="108" y="324" font-size="18" font-weight="600" fill="#C9D1D9">Drift detected. The LLM serves the page now <tspan fill="#8B949E" font-weight="400">&#8212;</tspan> and writes a fresh crawler.</text>

    <!-- two quiet inline facts, no boxes-within-boxes -->
    <g font-size="14" font-weight="400">
      <circle cx="116" cy="349" r="3.5" fill="#D29922"/>
      <text x="130" y="354" fill="#C9D1D9"><tspan font-weight="600">serve now</tspan> <tspan fill="#8B949E">&#8212; an LLM reads the raw HTML and returns this request's records. No outage.</tspan></text>
    </g>
    <g font-size="14" font-weight="400">
      <circle cx="116" cy="377" r="3.5" fill="#2EA043"/>
      <text x="130" y="382" fill="#C9D1D9"><tspan font-weight="600">heal</tspan> <tspan fill="#8B949E">&#8212; the loop samples pages, grades candidates against an oracle, and</tspan> <tspan fill="#2EA043" font-weight="600">promotes v2</tspan>.</text>
    </g>

    <!-- evidence: the one paid moment, with the honest breakdown -->
    <text x="1152" y="318" text-anchor="end" font-size="40" font-weight="700" fill="#D29922" font-family="ui-monospace, SFMono-Regular, 'SF Mono', Menlo, Consolas, 'Liberation Mono', monospace">6</text>
    <text x="1152" y="342" text-anchor="end" font-size="11.5" font-weight="400" fill="#8B949E" font-family="ui-monospace, SFMono-Regular, 'SF Mono', Menlo, Consolas, 'Liberation Mono', monospace">paid once, this request</text>
    <text x="1152" y="360" text-anchor="end" font-size="11" font-weight="400" fill="#30363D" font-family="ui-monospace, SFMono-Regular, 'SF Mono', Menlo, Consolas, 'Liberation Mono', monospace">1 serve + 3 learn + 2 write</text>
  </g>

  <line x1="108" y1="408" x2="1152" y2="408" stroke="#222A35" stroke-width="1" stroke-dasharray="2 4"/>

  <!-- =================================================================== -->
  <!-- BEAT 3 : AFTER - free again (the success green end state)            -->
  <!-- =================================================================== -->
  <g>
    <circle cx="74" cy="442" r="6" fill="#2EA043" stroke="#2EA043" stroke-width="2.5"/>
    <text x="108" y="440" font-size="12.5" font-weight="700" letter-spacing="1.5" fill="#2EA043">AFTER</text>
    <text x="108" y="466" font-size="18" font-weight="600" fill="#C9D1D9">The promoted crawler serves the new layout <tspan fill="#8B949E" font-weight="400">&#8212;</tspan> straight from the registry.</text>
    <text x="108" y="492" font-size="14" font-weight="400" fill="#8B949E">Same request, healed code, no model call. The site broke and fixed itself.</text>

    <!-- evidence: zero again -->
    <text x="1152" y="458" text-anchor="end" font-size="40" font-weight="700" fill="#2EA043" font-family="ui-monospace, SFMono-Regular, 'SF Mono', Menlo, Consolas, 'Liberation Mono', monospace">0</text>
    <text x="1152" y="482" text-anchor="end" font-size="12" font-weight="400" fill="#2EA043" font-family="ui-monospace, SFMono-Regular, 'SF Mono', Menlo, Consolas, 'Liberation Mono', monospace">free again</text>
  </g>
</svg>
