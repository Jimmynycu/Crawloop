<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 360" width="1200" height="360" role="img" aria-labelledby="crawloop-title crawloop-desc" preserveAspectRatio="xMidYMid meet" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
  <title id="crawloop-title">crawloop</title>
  <desc id="crawloop-desc">crawloop, a self-healing web scraper. The LLM writes the crawler once, then your pages run free. A site redesign is served instantly via the LLM, a new crawler is promoted, and steady-state model calls return to zero.</desc>

  <!-- self-contained background panel: reads deliberately on both #0d1117 and #ffffff -->
  <rect x="0" y="0" width="1200" height="360" rx="20" fill="#0A0C14"/>
  <rect x="0.75" y="0.75" width="1198.5" height="358.5" rx="19.25" fill="none" stroke="#222A35" stroke-width="1.5"/>

  <!-- ============ WORDMARK: plain text, no chrome, no glow ============ -->
  <text x="92" y="150" font-size="92" font-weight="700" letter-spacing="-2.5" fill="#C9D1D9">crawloop</text>
  <!-- the single heal-green accent: a left-anchored brand underline under the wordmark -->
  <rect x="94" y="170" width="150" height="6" rx="3" fill="#2EA043"/>

  <!-- ============ POSITIONING LINE (em-dash setup/payoff) ============ -->
  <text x="94" y="212" font-size="25" font-weight="400" fill="#C9D1D9">A self-healing web scraper <tspan fill="#8B949E">&#8212;</tspan> the LLM writes the crawler once, then your pages run free.</text>

  <!-- thin hairline separating identity from the proof strip -->
  <line x1="94" y1="244" x2="922" y2="244" stroke="#222A35" stroke-width="1"/>

  <!-- ============ ONE-LINE STATE STRIP: restraint, not a dashboard ============ -->
  <!-- three quiet beats tracing the whole story: broken -> served now -> free -->
  <g font-size="15" font-weight="600">
    <!-- BEFORE: a redesign breaks it (tiny red footprint, just enough to read the pain) -->
    <g transform="translate(94,272)">
      <circle cx="7" cy="13" r="4.5" fill="#F85149"/>
      <text x="22" y="18" fill="#8B949E">a redesign breaks it</text>
    </g>
    <text x="262" y="290" font-size="16" fill="#30363D" font-weight="400">&#8594;</text>

    <!-- DURING: served now via the LLM (the one amber spotlight beat) -->
    <g transform="translate(292,272)">
      <circle cx="7" cy="13" r="4.5" fill="#D29922"/>
      <text x="22" y="18" fill="#C9D1D9">served instantly via the LLM</text>
    </g>
    <text x="556" y="290" font-size="16" fill="#30363D" font-weight="400">&#8594;</text>

    <!-- AFTER: new crawler promoted, back to $0 (the success green) -->
    <g transform="translate(586,272)">
      <circle cx="7" cy="13" r="4.5" fill="#2EA043"/>
      <text x="22" y="18" fill="#C9D1D9">a fresh crawler is promoted <tspan fill="#8B949E" font-weight="400">&#8212;</tspan> back to <tspan fill="#2EA043" font-weight="700">$0 / page</tspan></text>
    </g>
  </g>

  <!-- ============ HONEST FOOTER: one quiet calibrated, monospaced line ============ -->
  <text x="94" y="326" font-size="13.5" font-weight="400" fill="#8B949E" font-family="ui-monospace, SFMono-Regular, 'SF Mono', Menlo, Consolas, 'Liberation Mono', monospace">working proof of concept  &#183;  532 tests pass offline, no API key  &#183;  falls back to the LLM, never worse</text>

  <!-- ============ RIGHT-EDGE PROOF ANCHOR: the headline number, heaviest weight ============ -->
  <line x1="970" y1="96" x2="970" y2="264" stroke="#222A35" stroke-width="1"/>
  <g transform="translate(1106,0)" text-anchor="end" font-family="ui-monospace, SFMono-Regular, 'SF Mono', Menlo, Consolas, 'Liberation Mono', monospace">
    <text x="0" y="150" font-size="86" font-weight="700" fill="#2EA043">$0</text>
    <text x="0" y="186" font-size="15" font-weight="400" fill="#C9D1D9">per page in steady state</text>
    <text x="0" y="232" font-size="14" font-weight="400" fill="#8B949E">model calls to serve a page&#160;&#160;<tspan fill="#2EA043" font-weight="700" font-size="20">0</tspan></text>
  </g>
</svg>
