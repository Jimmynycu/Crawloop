<svg viewBox="0 0 960 560" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="hiw-title hiw-desc" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <title id="hiw-title">How crawloop works</title>
  <desc id="hiw-desc">A request is checked against the domain allowlist, routed to its page family, then served by a fast deterministic version-ladder crawler at zero cost. When a site redesign causes drift, an LLM serves the request now while a fresh crawler is regenerated in the background, promoted as a new version, and the family runs free again.</desc>

  <defs>
    <marker id="aGray"  viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 z" fill="#6e7681"/></marker>
    <marker id="aGreen" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 z" fill="#2EA043"/></marker>
    <marker id="aAmber" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 z" fill="#D29922"/></marker>
    <marker id="aPink"  viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 z" fill="#db61c2"/></marker>
    <marker id="aIndigo" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 z" fill="#6e6ae0"/></marker>
  </defs>

  <!-- self-contained carbon panel: matches hero.svg / demo.svg, reads on both GitHub themes -->
  <rect x="0" y="0" width="960" height="560" rx="20" fill="#0A0C14"/>
  <rect x="0.75" y="0.75" width="958.5" height="558.5" rx="19.25" fill="none" stroke="#222A35" stroke-width="1.5"/>

  <!-- ===================== header ===================== -->
  <text x="40" y="48" font-size="22" font-weight="700" fill="#C9D1D9">How it works</text>
  <text x="40" y="74" font-size="13.5" fill="#8B949E">Serve now, heal in the background &#8212; the whole contract, one request at a time.</text>

  <!-- ===================== HAPPY PATH band header ===================== -->
  <text x="40" y="120" font-size="11.5" font-weight="700" letter-spacing="0.6" fill="#3fb950">FAST PATH &#183; DETERMINISTIC &#183; $0</text>

  <!-- promote v2 climbs the left margin and runs back across its OWN lane (y=150) into the crawler: free again.
       drawn before the boxes + pill so the pill fill covers the line cleanly -->
  <path d="M80 437 L24 437 L24 150 L684 150 L684 182" fill="none" stroke="#2EA043" stroke-width="2" stroke-dasharray="6 4" marker-end="url(#aGreen)"/>
  <rect x="330" y="139" width="218" height="22" rx="11" fill="#0e1a14" stroke="#2EA043" stroke-width="1.2"/>
  <text x="439" y="154" text-anchor="middle" font-size="10.5" font-weight="700" fill="#3fb950">new active version &#8594; FREE AGAIN &#183; $0</text>

  <!-- ===================== fast-path box row (y 182-256) ===================== -->
  <rect x="40" y="186" width="148" height="66" rx="9" fill="#0d1c2e" stroke="#1f6feb" stroke-width="1.5"/>
  <text x="114" y="213" text-anchor="middle" font-size="13.5" font-weight="700" fill="#79c0ff">Request</text>
  <text x="114" y="232" text-anchor="middle" font-size="10.5" fill="#6ea8e6">url + schema</text>

  <rect x="228" y="186" width="148" height="66" rx="9" fill="#161b22" stroke="#3d444d" stroke-width="1.5"/>
  <text x="302" y="213" text-anchor="middle" font-size="13.5" font-weight="700" fill="#C9D1D9">Allowlist</text>
  <text x="302" y="232" text-anchor="middle" font-size="10.5" fill="#8B949E">authorized? hard gate</text>

  <rect x="416" y="186" width="148" height="66" rx="9" fill="#161b22" stroke="#3d444d" stroke-width="1.5"/>
  <text x="490" y="213" text-anchor="middle" font-size="13.5" font-weight="700" fill="#C9D1D9">Route</text>
  <text x="490" y="232" text-anchor="middle" font-size="10.5" fill="#8B949E">url &#8594; page family</text>

  <rect x="604" y="182" width="160" height="74" rx="9" fill="#0e1a14" stroke="#2EA043" stroke-width="1.5"/>
  <text x="684" y="207" text-anchor="middle" font-size="13.5" font-weight="700" fill="#3fb950">Version-ladder</text>
  <text x="684" y="224" text-anchor="middle" font-size="13.5" font-weight="700" fill="#3fb950">crawler</text>
  <text x="684" y="243" text-anchor="middle" font-size="10.5" fill="#46a860">generated code &#183; ms &#183; $0</text>

  <rect x="804" y="186" width="116" height="66" rx="9" fill="#0d1c2e" stroke="#1f6feb" stroke-width="1.5"/>
  <text x="862" y="213" text-anchor="middle" font-size="13" font-weight="700" fill="#79c0ff">Records</text>
  <text x="862" y="232" text-anchor="middle" font-size="10.5" fill="#6ea8e6">validated &#10003;</text>

  <!-- happy-path arrows (row center y=219) -->
  <line x1="188" y1="219" x2="226" y2="219" stroke="#6e7681" stroke-width="1.6" marker-end="url(#aGray)"/>
  <line x1="376" y1="219" x2="414" y2="219" stroke="#6e7681" stroke-width="1.6" marker-end="url(#aGray)"/>
  <line x1="564" y1="219" x2="602" y2="219" stroke="#6e7681" stroke-width="1.6" marker-end="url(#aGray)"/>
  <line x1="764" y1="219" x2="802" y2="219" stroke="#2EA043" stroke-width="2" marker-end="url(#aGreen)"/>
  <text x="784" y="212" text-anchor="middle" font-size="9.5" fill="#3fb950">pass</text>

  <!-- ===================== drift trigger (clear gap below the crawler) ===================== -->
  <path d="M684 256 L684 282" fill="none" stroke="#D29922" stroke-width="2" marker-end="url(#aAmber)"/>
  <rect x="612" y="282" width="144" height="22" rx="11" fill="#1a130c" stroke="#D29922" stroke-width="1.2"/>
  <text x="684" y="297" text-anchor="middle" font-size="10.5" font-weight="700" fill="#e3b341">site redesign &#8594; DRIFT</text>

  <!-- drift -> serve now (drops into the heal band) -->
  <path d="M684 304 L684 380 L666 380 L666 398" fill="none" stroke="#db61c2" stroke-width="2" marker-end="url(#aPink)"/>

  <!-- ===================== HEAL band (background) ===================== -->
  <rect x="40" y="344" width="880" height="166" rx="14" fill="#10141d" stroke="#222A35" stroke-width="1.2"/>
  <text x="62" y="370" font-size="11.5" font-weight="700" letter-spacing="0.6" fill="#b9b3ff">ON DRIFT &#183; SERVE NOW, HEAL IN THE BACKGROUND</text>
  <line x1="62" y1="378" x2="898" y2="378" stroke="#222A35" stroke-width="1"/>

  <!-- A . serve-now via LLM (the immediate answer) -->
  <rect x="566" y="398" width="200" height="78" rx="9" fill="#1b0f1a" stroke="#db61c2" stroke-width="1.5"/>
  <text x="666" y="425" text-anchor="middle" font-size="13.5" font-weight="700" fill="#f0a3d6">Serve now via LLM</text>
  <text x="666" y="444" text-anchor="middle" font-size="10.5" fill="#d68fc4">reads raw HTML, same schema</text>
  <text x="666" y="461" text-anchor="middle" font-size="10.5" fill="#d68fc4">no outage &#183; this request answered</text>

  <!-- serve-now feeds the same Records output (it IS the answer, right now) -->
  <path d="M766 437 L862 437 L862 254" fill="none" stroke="#2EA043" stroke-width="2" marker-end="url(#aGreen)"/>
  <text x="824" y="332" text-anchor="middle" font-size="9.5" fill="#3fb950">answers now</text>

  <!-- enqueue the loop (in the background) -->
  <path d="M566 437 L470 437" fill="none" stroke="#6e6ae0" stroke-width="2" marker-end="url(#aIndigo)"/>
  <text x="518" y="429" text-anchor="middle" font-size="9.5" fill="#b9b3ff">enqueue</text>

  <!-- B . THE LOOP regenerate -->
  <rect x="270" y="398" width="200" height="78" rx="9" fill="#13112b" stroke="#6e6ae0" stroke-width="2"/>
  <text x="370" y="423" text-anchor="middle" font-size="13.5" font-weight="700" fill="#b9b3ff">Regenerate &#8212; The Loop</text>
  <text x="370" y="442" text-anchor="middle" font-size="10.5" fill="#9d97e8">sample &#8594; oracle &#8594; codegen</text>
  <text x="370" y="459" text-anchor="middle" font-size="10.5" fill="#9d97e8">&#8594; gauntlet (test vs oracle)</text>

  <!-- C . promote v2 -->
  <rect x="80" y="398" width="150" height="78" rx="9" fill="#0e1a14" stroke="#2EA043" stroke-width="1.5"/>
  <text x="155" y="425" text-anchor="middle" font-size="13.5" font-weight="700" fill="#3fb950">Promote v2</text>
  <text x="155" y="444" text-anchor="middle" font-size="10.5" fill="#46a860">append + reorder</text>
  <text x="155" y="461" text-anchor="middle" font-size="10.5" fill="#46a860">ladder, no overwrite</text>

  <!-- loop -> promote -->
  <path d="M270 437 L232 437" fill="none" stroke="#2EA043" stroke-width="2" marker-end="url(#aGreen)"/>
  <text x="251" y="429" text-anchor="middle" font-size="9.5" fill="#3fb950">winner</text>

  <!-- ===================== legend ===================== -->
  <g font-size="10.5">
    <rect x="40" y="523" width="13" height="13" rx="3" fill="#0e1a14" stroke="#2EA043"/>
    <text x="59" y="533" fill="#8B949E">fast deterministic path &#183; $0</text>

    <rect x="246" y="523" width="13" height="13" rx="3" fill="#1a130c" stroke="#D29922"/>
    <text x="265" y="533" fill="#8B949E">drift detected</text>

    <rect x="392" y="523" width="13" height="13" rx="3" fill="#1b0f1a" stroke="#db61c2"/>
    <text x="411" y="533" fill="#8B949E">paid LLM &#183; serves now</text>

    <rect x="592" y="523" width="13" height="13" rx="3" fill="#13112b" stroke="#6e6ae0"/>
    <text x="611" y="533" fill="#8B949E">self-healing loop (background)</text>

    <line x1="828" y1="530" x2="858" y2="530" stroke="#2EA043" stroke-width="2" stroke-dasharray="6 4"/>
    <text x="864" y="533" fill="#8B949E">promote</text>
  </g>
</svg>
